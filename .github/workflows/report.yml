name: 🚀 Fleet AutoLink — Test & Security Report

on:
  push:
    branches: [main]

jobs:
  report:
    name: Test Cases & Security Report
    runs-on: ubuntu-latest

    steps:
      # ─────────────────────────────────────────────────────────
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # ──────────────────── WEB ─────────────────────────────────
      - name: 📦 Install Web Dependencies
        working-directory: web
        run: npm install

      - name: 🧪 Run Web Tests
        working-directory: web
        continue-on-error: true
        run: npx vitest run --reporter=json --outputFile=../web-results.json

      - name: 🔒 Web Security Audit
        working-directory: web
        continue-on-error: true
        run: npm audit --json > ../web-audit.json 2>/dev/null || true

      # ──────────────────── MOBILE ──────────────────────────────
      - name: 📦 Install Mobile Dependencies
        working-directory: mobile
        run: npm install --legacy-peer-deps

      - name: 🧪 Run Mobile Tests
        working-directory: mobile
        continue-on-error: true
        run: npx jest --json --outputFile=../mobile-results.json 2>/dev/null || true

      - name: 🔒 Mobile Security Audit
        working-directory: mobile
        continue-on-error: true
        run: npm audit --json > ../mobile-audit.json 2>/dev/null || true

      # ──────────────────── REPORT ──────────────────────────────
      - name: 📊 Generate Summary Report & Excel CSV
        run: |
          cat > /tmp/report.js << 'REPORT_EOF'
          const fs = require('fs');

          function readJSON(p) {
            try { return JSON.parse(fs.readFileSync(p, 'utf8')); } catch { return null; }
          }

          const lines = [];
          const L = (s = '') => lines.push(s);
          const summaryFile = process.env.GITHUB_STEP_SUMMARY;

          const contributor = 'Abinesh-10';
          const repo        = 'Fleet-Autolink-PDD';

          // ── Header ──────────────────────────────────────────────
          L('# 🚀 Fleet AutoLink — CI Test & Security Report');
          L('');
          L('| Field | Value |');
          L('|-------|-------|');
          L(`| 📅 Generated | ${new Date().toUTCString()} |`);
          L(`| 👤 Contributor | **${contributor}** |`);
          L(`| 📁 Repository | \`${repo}\` |`);
          L(`| 🌿 Branch | \`main\` |`);
          L(`| ⚙️ Node | 22 &nbsp;\\| &nbsp;Platform: Ubuntu Latest |`);
          L('');
          L('---');
          L('');

          // ── Web Tests ───────────────────────────────────────────
          L('## 🌐 Web Test Results');
          L('> **Framework:** Vitest + React Testing Library + jsdom');
          L('');
          const wr = readJSON('web-results.json');
          const csvRows = [['#', 'Platform', 'Suite', 'Test Case', 'Status', 'Duration (ms)']];

          if (wr) {
            const pass   = wr.numPassedTests  || 0;
            const fail   = wr.numFailedTests  || 0;
            const total  = wr.numTotalTests   || 0;
            const suites = wr.numTotalTestSuites || 0;
            L(fail === 0
              ? `> ### ✅ ALL ${total} TEST CASES PASSED across ${suites} suite(s)`
              : `> ### ❌ ${fail} of ${total} TEST CASES FAILED`);
            L('');
            L('| # | Test Suite | Test Case | Status | Duration |');
            L('|---|-----------|-----------|:------:|:--------:|');
            let i = 1;
            for (const suite of (wr.testResults || [])) {
              const name = (suite.testFilePath || '').split('/').pop().replace(/\.test\.[tj]sx?$/, '');
              for (const t of (suite.assertionResults || [])) {
                const status = t.status === 'passed' ? '✅ PASS' : '❌ FAIL';
                const dur    = typeof t.duration === 'number' ? `${t.duration}ms` : '—';
                L(`| ${i} | \`${name}\` | ${t.title} | ${status} | ${dur} |`);
                csvRows.push([i, 'Web', name, t.title, t.status === 'passed' ? 'PASS' : 'FAIL', typeof t.duration === 'number' ? t.duration : '']);
                i++;
              }
            }
          } else {
            L('> ⚠️ Web test results could not be loaded.');
          }

          L('');
          L('---');
          L('');

          // ── Mobile Tests ─────────────────────────────────────────
          L('## 📱 Mobile Test Results');
          L('> **Framework:** Jest + jest-expo + React Native Testing Library');
          L('');
          const mr = readJSON('mobile-results.json');
          if (mr) {
            const pass   = mr.numPassedTests  || 0;
            const fail   = mr.numFailedTests  || 0;
            const total  = mr.numTotalTests   || 0;
            const suites = mr.numTotalTestSuites || 0;
            L(fail === 0
              ? `> ### ✅ ALL ${total} TEST CASES PASSED across ${suites} suite(s)`
              : `> ### ❌ ${fail} of ${total} TEST CASES FAILED`);
            L('');
            L('| # | Test Suite | Test Case | Status | Duration |');
            L('|---|-----------|-----------|:------:|:--------:|');
            let i = 1;
            for (const suite of (mr.testResults || [])) {
              const name = (suite.testFilePath || '').split('/').pop().replace(/\.test\.[tj]sx?$/, '');
              for (const t of (suite.assertionResults || [])) {
                const status = t.status === 'passed' ? '✅ PASS' : '❌ FAIL';
                const dur    = typeof t.duration === 'number' ? `${t.duration}ms` : '—';
                L(`| ${i} | \`${name}\` | ${t.title} | ${status} | ${dur} |`);
                csvRows.push([i, 'Mobile', name, t.title, t.status === 'passed' ? 'PASS' : 'FAIL', typeof t.duration === 'number' ? t.duration : '']);
                i++;
              }
            }
          } else {
            L('> ⚠️ Mobile test results could not be loaded.');
          }

          L('');
          L('---');
          L('');

          // ── Security Advisory (Informational) ────────────────────
          L('## 🔒 Security Advisory Scan');
          L('> ℹ️ **Informational only — does NOT affect build status.**');
          L('> Tool: `npm audit` — checks dependencies against the npm Advisory Database (CVE).');
          L('');

          for (const [label, path] of [['🌐 Web', 'web-audit.json'], ['📱 Mobile', 'mobile-audit.json']]) {
            L(`### ${label} Dependencies`);
            L('');
            const a = readJSON(path);
            if (a && a.metadata && a.metadata.vulnerabilities) {
              const v     = a.metadata.vulnerabilities;
              const total = (v.critical||0) + (v.high||0) + (v.moderate||0) + (v.low||0);
              const risk  = v.critical > 0 ? '🔴 CRITICAL'
                          : v.high     > 0 ? '🟠 HIGH'
                          : v.moderate > 0 ? '🟡 MODERATE'
                          : '✅ CLEAN';

              L(`**Risk Level: ${risk}** — ${total} advisories found (informational)`);
              L('');
              L('| Severity | Count | Recommendation |');
              L('|----------|:-----:|----------------|');
              L(`| 🔴 Critical | **${v.critical||0}** | ${v.critical > 0 ? 'Run `npm audit fix --force`' : '✅ None'} |`);
              L(`| 🟠 High     | **${v.high||0}**     | ${v.high     > 0 ? 'Run `npm audit fix`'          : '✅ None'} |`);
              L(`| 🟡 Moderate | **${v.moderate||0}** | ${v.moderate > 0 ? 'Review and plan update'        : '✅ None'} |`);
              L(`| 🟢 Low      | **${v.low||0}**      | ${v.low      > 0 ? 'Monitor for updates'           : '✅ None'} |`);
              L('');

              if (a.vulnerabilities) {
                const entries = Object.entries(a.vulnerabilities)
                  .sort(([, x], [, y]) => {
                    const ord = { critical: 0, high: 1, moderate: 2, low: 3 };
                    return (ord[x.severity] ?? 4) - (ord[y.severity] ?? 4);
                  })
                  .slice(0, 15);

                if (entries.length > 0) {
                  L('<details>');
                  L('<summary>📋 Expand — Advisory Details (top 15)</summary>');
                  L('');
                  L('| # | Package | Severity | Advisory | Fix |');
                  L('|---|---------|:--------:|---------|:---:|');
                  entries.forEach(([pkg, info], idx) => {
                    const sev  = info.severity || 'unknown';
                    const icon = { critical: '🔴', high: '🟠', moderate: '🟡', low: '🟢' }[sev] || '⚪';
                    const desc = Array.isArray(info.via)
                      ? (info.via.filter(x => typeof x === 'object').map(x => x.title || '').filter(Boolean)[0] || pkg)
                      : String(info.via);
                    const fix  = info.fixAvailable === true     ? '`npm audit fix`'
                               : info.fixAvailable             ? '⚠️ Breaking'
                               : '❌ None';
                    L(`| ${idx+1} | \`${pkg}\` | ${icon} ${sev} | ${String(desc).substring(0, 55)} | ${fix} |`);
                  });
                  L('');
                  L('</details>');
                }
              }
            } else {
              L('> ✅ No advisory data — audit was clean or data unavailable.');
            }
            L('');
          }

          L('---');
          L('');

          // ── Executive Summary ────────────────────────────────────
          L('## 📊 Executive Summary');
          L('');
          L('| Area | Details | Result |');
          L('|------|---------|:------:|');

          if (wr) {
            const ok = wr.numFailedTests === 0;
            L(`| 🌐 **Web Tests** | ${wr.numPassedTests} / ${wr.numTotalTests} passed | ${ok ? '✅ PASS' : '❌ FAIL'} |`);
          } else {
            L('| 🌐 **Web Tests** | Results unavailable | ⚠️ N/A |');
          }
          if (mr) {
            const ok = mr.numFailedTests === 0;
            L(`| 📱 **Mobile Tests** | ${mr.numPassedTests} / ${mr.numTotalTests} passed | ${ok ? '✅ PASS' : '❌ FAIL'} |`);
          } else {
            L('| 📱 **Mobile Tests** | Results unavailable | ⚠️ N/A |');
          }

          const wa = readJSON('web-audit.json');
          const ma = readJSON('mobile-audit.json');
          if (wa?.metadata?.vulnerabilities) {
            const v = wa.metadata.vulnerabilities;
            const t = (v.critical||0)+(v.high||0)+(v.moderate||0)+(v.low||0);
            const icon = v.critical > 0 ? '🔴' : v.high > 0 ? '🟠' : v.moderate > 0 ? '🟡' : '🟢';
            L(`| 🔒 **Web Security** | ${t} advisories (C:${v.critical} H:${v.high} M:${v.moderate} L:${v.low}) — informational | ${icon} |`);
          }
          if (ma?.metadata?.vulnerabilities) {
            const v = ma.metadata.vulnerabilities;
            const t = (v.critical||0)+(v.high||0)+(v.moderate||0)+(v.low||0);
            const icon = v.critical > 0 ? '🔴' : v.high > 0 ? '🟠' : v.moderate > 0 ? '🟡' : '🟢';
            L(`| 🔒 **Mobile Security** | ${t} advisories (C:${v.critical} H:${v.high} M:${v.moderate} L:${v.low}) — informational | ${icon} |`);
          }

          const totalPassed = (wr?.numPassedTests || 0) + (mr?.numPassedTests || 0);
          const totalFailed = (wr?.numFailedTests || 0) + (mr?.numFailedTests || 0);
          const totalTests  = (wr?.numTotalTests  || 0) + (mr?.numTotalTests  || 0);

          L(`| 🧮 **Total** | ${totalPassed} / ${totalTests} test cases passed | ${totalFailed === 0 ? '✅ ALL PASS' : '❌ FAILURES'} |`);
          L(`| 👤 **Contributor** | ${contributor} | — |`);
          L('');
          L(totalFailed === 0
            ? '> ## ✅ ALL TEST CASES PASSED. Application quality verified.'
            : `> ## ❌ ${totalFailed} TEST CASE(S) FAILED. Review required.`);
          L('');
          L('> 📎 **Download the full test report as a spreadsheet** from the *Artifacts* section below this summary.');
          L('');
          L('---');
          L('');
          L(`*🤖 Auto-generated by Fleet AutoLink CI &nbsp;|&nbsp; Contributor: ${contributor} &nbsp;|&nbsp; Fleet AutoLink © 2026*`);

          fs.appendFileSync(summaryFile, lines.join('\n') + '\n');
          console.log('✅ Report written to GitHub Step Summary.');

          // ── CSV / Excel export ────────────────────────────────────
          const escape = v => `"${String(v).replace(/"/g, '""')}"`;
          const csv    = csvRows.map(row => row.map(escape).join(',')).join('\n');
          fs.writeFileSync('test-results.csv', csv + '\n');
          console.log('✅ CSV written: test-results.csv (' + csvRows.length + ' rows)');
          REPORT_EOF
          node /tmp/report.js

      - name: 📎 Upload Test Results (Excel CSV Artifact)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Fleet-AutoLink-Test-Report
          path: test-results.csv
          retention-days: 30

      - name: ✅ Enforce Test Pass
        run: |
          node -e "
            const fs = require('fs');
            const wr = JSON.parse(fs.readFileSync('web-results.json', 'utf8'));
            const mr = JSON.parse(fs.readFileSync('mobile-results.json', 'utf8'));
            const failed = (wr.numFailedTests || 0) + (mr.numFailedTests || 0);
            const passed = (wr.numPassedTests || 0) + (mr.numPassedTests || 0);
            const total  = (wr.numTotalTests  || 0) + (mr.numTotalTests  || 0);
            console.log('Web    : ' + wr.numPassedTests + '/' + wr.numTotalTests + ' passed');
            console.log('Mobile : ' + mr.numPassedTests + '/' + mr.numTotalTests + ' passed');
            console.log('TOTAL  : ' + passed + '/' + total + ' passed, ' + failed + ' failed');
            if (failed > 0) {
              console.error('FAILED: ' + failed + ' test case(s) did not pass.');
              process.exit(1);
            }
            console.log('SUCCESS: All ' + passed + ' test cases passed!');
          "
